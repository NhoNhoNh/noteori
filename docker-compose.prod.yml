version: '3.8'

services:
  # Nginx Web Server (Proxy to frontend and backend)
  nginx:
    image: nginx:alpine
    container_name: noteori-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/var/www/html
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - php
      - frontend
    networks:
      - noteori-network

  # Certbot for SSL
  certbot:
    image: certbot/certbot
    container_name: noteori-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # PHP-FPM (Laravel)
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: noteori-php
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - noteori-network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: noteori-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - noteori-network

  # Redis (Cache, Queue, Sessions)
  redis:
    image: redis:alpine
    container_name: noteori-redis
    restart: unless-stopped
    networks:
      - noteori-network

  # React Frontend (Production Build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: noteori-frontend
    restart: unless-stopped
    networks:
      - noteori-network

  # Laravel Queue Worker
  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: noteori-queue
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    command: php artisan queue:work --tries=3
    depends_on:
      - mysql
      - redis
    networks:
      - noteori-network

  # Laravel Reverb (WebSocket)
  reverb:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: noteori-reverb
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      - mysql
      - redis
    networks:
      - noteori-network

volumes:
  mysql-data:

networks:
  noteori-network:
    driver: bridge
