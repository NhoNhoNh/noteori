version: '3.8'

services:
  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: noteori-nginx
    ports:
      - "8000:80"
      - "8443:443"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - frontend
    networks:
      - noteori-network

  # PHP-FPM (Laravel)
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: noteori-php
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql
      - redis
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=noteori
      - DB_USERNAME=noteori_user
      - DB_PASSWORD=noteori_secret
      - REDIS_HOST=redis
      # - MAIL_MAILER=smtp
      # - MAIL_HOST=mailpit
      # - MAIL_PORT=1025
    networks:
      - noteori-network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: noteori-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: noteori
      MYSQL_USER: noteori_user
      MYSQL_PASSWORD: noteori_secret
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - noteori-network

  # Redis (Cache, Queue, Sessions)
  redis:
    image: redis:alpine
    container_name: noteori-redis
    ports:
      - "6379:6379"
    networks:
      - noteori-network

  # React Frontend (Dev)
  frontend:
    image: node:20-alpine
    container_name: noteori-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - noteori-network

  # Laravel Queue Worker
  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: noteori-queue
    volumes:
      - ./backend:/var/www/html
    command: php artisan queue:work --tries=3
    depends_on:
      - mysql
      - redis
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=noteori
      - DB_USERNAME=noteori_user
      - DB_PASSWORD=noteori_secret
      - REDIS_HOST=redis
      # - MAIL_MAILER=smtp
      # - MAIL_HOST=mailpit
      # - MAIL_PORT=1025
    networks:
      - noteori-network

  # Laravel Reverb (WebSocket)
  reverb:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: noteori-reverb
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      - mysql
      - redis
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=noteori
      - DB_USERNAME=noteori_user
      - DB_PASSWORD=noteori_secret
      - REDIS_HOST=redis
    networks:
      - noteori-network

  # Mailpit (Local SMTP and Web UI)
  mailpit:
    image: axllent/mailpit
    container_name: noteori-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - noteori-network

volumes:
  mysql-data:

networks:
  noteori-network:
    driver: bridge
